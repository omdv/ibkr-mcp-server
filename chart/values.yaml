imagePullSecrets: []

ibGateway:
  image:
    repository: ghcr.io/extrange/ibkr
    tag: "10.39"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    ports:
      vnc: 6080
      api: 8888
      command: 7462

  resources: {}
    # limits:
    #   memory: "2Gi"
    #   cpu: "2000m"
    # requests:
    #   memory: "1Gi"
    #   cpu: "1000m"

  # startupProbe runs instead of liveness until port 4001 first opens.
  # Budget must cover the full 2FA authentication wait.
  startupProbe:
    periodSeconds: 30
    failureThreshold: 40    # 40 × 30s = 20 min ceiling for 2FA
    timeoutSeconds: 5


mcpServer:
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  image:
    repository: ghcr.io/omdv/ibkr-mcp-server
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000

  ingress:
    enabled: false
    className: nginx
    host: ibkr-mcp-server.local
    path: /
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls: []
    # Example TLS configuration:
    # tls:
    # - secretName: ibkr-mcp-server-tls
    #   hosts:
    #   - ibkr-mcp-server.local

  livenessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 25
    failureThreshold: 10

config:
  # IB Gateway Configuration
  twoFaTimeoutAction: "restart"
  ibcTradingMode: "live"
  ibcReadOnlyApi: "no"
  ibcReloginAfterSecondFactorAuthenticationTimeout: "yes"
  ibcAutoRestartTime: "06:00 AM"
  ibcColdRestartTime: "10:00"
  ibcExistingSessionDetectedAction: "primaryoverride"
  ibcAcceptIncomingConnectionAction: "accept"
  ibcAcceptBidAskLastSizeDisplayUpdateNotification: "defer"
  ibcCommandServerPort: "7462"
  ibcControlFrom: "127.0.0.1"
  ibcBindAddress: "127.0.0.1"

  # MCP Server Configuration
  ibkrLogLevel: "INFO"
  corsAllowedOrigins: "*"
  enableMcp: "false"

# IB Gateway credentials
gatewaySecret:
  # Name of existing secret containing IB Gateway credentials
  # The secret must contain 'username' and 'password' keys
  existingSecret: ""

# MCP Server authentication
mcpAuth:
  # Set to true to create a new auth secret with auto-generated token
  # Set to false to use an existing secret (specify name in existingSecret)
  create: true

  # Name of existing secret to use (only used when create: false)
  # The secret must contain 'authToken' key
  existingSecret: ""

  # Auth token value (leave empty to auto-generate a secure random token)
  authToken: ""

networkPolicy:
  enabled: true

nodeSelector: {}
tolerations: []
affinity: {}
