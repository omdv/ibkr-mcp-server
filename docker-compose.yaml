# optimized for podman backend
# Gateway is managed separately via docker-compose.gateway.yaml
---
services:
  ibkr-mcp-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      IBKR_GATEWAY_MODE: external
      IBKR_IB_GATEWAY_HOST: ib-gateway
      IBKR_IB_GATEWAY_PORT: 8888
      IBKR_APPLICATION_HOST: 0.0.0.0
      IBKR_APPLICATION_PORT: 8000
      IBKR_LOG_LEVEL: DEBUG
      IBKR_AUTH_TOKEN: ${IBKR_AUTH_TOKEN:-}
      IBKR_CORS_ALLOWED_ORIGINS: ${IBKR_CORS_ALLOWED_ORIGINS:-*}
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:8000/gateway/status || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ibkr-net

networks:
  ibkr-net:
    external: true
    name: ibkr-net